<div class="page page-scroll">
    <div class="brand">
        <img ng-src="{{routeCharImg}}" class="brand-character" ng-if="routeCharImg">
        <div class="brand-icon" ng-if="!routeCharImg"><i class="fas fa-leaf"></i></div>
        <h1>Rota Viva</h1>
        <p ng-if="preTheme">{{preTheme.title}} — Crie sua conta</p>
        <p ng-if="!preTheme">Crie sua conta</p>
    </div>

    <div class="card">
        <div class="msg msg-error" ng-if="error">
            <i class="fas fa-exclamation-circle"></i> {{error}}
        </div>
        <div class="msg msg-success" ng-if="success">
            <i class="fas fa-check-circle"></i> {{success}}
        </div>

        <form ng-submit="signup()" ng-if="!success">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nome completo *</label>
                <input type="text" class="form-input" ng-model="form.name"
                       placeholder="Seu nome completo"
                       autocomplete="name">
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> CPF *</label>
                <input type="tel" class="form-input" ng-model="form.cpf"
                       placeholder="000.000.000-00" maxlength="14"
                       autocomplete="off">
            </div>

            <div class="form-group" ng-if="profileLocked">
                <label><i class="fas fa-route"></i> Perfil</label>
                <input type="text" class="form-input" value="{{preTheme.title}} — {{form.profile | capitalize}}" readonly
                       style="opacity: 0.7; cursor: not-allowed;">
            </div>

            <div class="form-group" ng-if="!profileLocked">
                <label><i class="fas fa-route"></i> Perfil *</label>
                <select class="form-select" ng-model="form.profile">
                    <option value="">Selecione seu perfil</option>
                    <option ng-repeat="r in routes" value="{{r.profile}}">
                        {{r.title}} — {{r.profile | capitalize}}
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Senha *</label>
                <input type="password" class="form-input" ng-model="form.password"
                       placeholder="Mínimo 6 caracteres"
                       autocomplete="new-password">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirmar senha *</label>
                <input type="password" class="form-input" ng-model="form.confirmPassword"
                       placeholder="Repita sua senha"
                       autocomplete="new-password">
            </div>

            <div class="form-group">
                <label><i class="fab fa-whatsapp"></i> Telefone/WhatsApp *</label>
                <input type="tel" class="form-input" ng-model="form.phone"
                       placeholder="(00) 00000-0000"
                       autocomplete="tel">
            </div>

            <hr class="form-divider">
            <div class="form-divider-label">Opcional</div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email <span class="optional">— para recuperar sua senha</span></label>
                <input type="email" class="form-input" ng-model="form.email"
                       placeholder="seu@email.com"
                       autocomplete="email">
            </div>

            <button type="submit" class="btn btn-primary" ng-disabled="submitting">
                <i class="fas fa-user-plus" ng-if="!submitting"></i>
                {{submitting ? 'Cadastrando...' : 'Criar conta'}}
            </button>
        </form>

        <a href="#!/login" class="link">Já tem conta? <strong>Entrar</strong></a>
    </div>
</div>
