<div class="page login-page">

    <!-- Modal: qual é a sua rota? (aparece quando não há tema em cache) -->
    <div class="route-modal-overlay" ng-if="showRouteModal">
        <div class="route-modal">
            <img src="img/logo-midr.png" alt="MIDR" class="route-modal-logo" onerror="this.style.display='none'">
            <h2 class="route-modal-title">Qual é a sua rota?</h2>
            <p class="route-modal-sub">Selecione seu perfil para continuar</p>
            <div class="route-modal-options">
                <button class="route-modal-card route-modal-card--mel" ng-click="selectRoute('mel')">
                    <img src="img/characters/mel/front/abelha.apng" alt="Apicultor" class="route-modal-char">
                    <span class="route-modal-label">Apicultor</span>
                    <span class="route-modal-name">Rota do Mel</span>
                </button>
                <button class="route-modal-card route-modal-card--pesca" ng-click="selectRoute('pesca')">
                    <img src="img/characters/pesca/front/peixe.apng" alt="Pescador" class="route-modal-char">
                    <span class="route-modal-label">Pescador</span>
                    <span class="route-modal-name">Rota da Pesca</span>
                </button>
            </div>
        </div>
    </div>
    <div class="brand">
        <img ng-src="{{routeCharImg}}" class="brand-character" ng-if="routeCharImg">
        <div class="brand-icon" ng-if="!routeCharImg"><i class="fas fa-leaf"></i></div>
        <h1 class="login-title">{{routeTitle}}</h1>
        <p ng-if="!preTheme">Gamificação para produtores rurais</p>
        <p ng-if="preTheme">{{preTheme.title}}</p>
    </div>

    <div class="login-form-container">
        <div class="msg msg-error" ng-if="error">
            <i class="fas fa-exclamation-circle"></i> {{error}}
        </div>

        <form ng-submit="login()">
            <div class="login-input-group">
                <i class="fas fa-user login-input-icon"></i>
                <input type="tel" class="login-input" ng-model="form.cpf"
                       placeholder="CPF" maxlength="14"
                       autocomplete="username">
            </div>

            <div class="login-input-group">
                <i class="fas fa-lock login-input-icon"></i>
                <input type="password" class="login-input" ng-model="form.password"
                       placeholder="Senha"
                       autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary login-btn" ng-disabled="submitting">
                {{submitting ? 'Entrando...' : 'Entrar'}}
            </button>
        </form>

        <a href="" ng-click="" class="login-link">
            Esqueci minha senha
        </a>
    </div>

    <a href="#!/signup" class="login-link" style="margin-top: 24px;">
        Não tem conta? <strong>Cadastre-se</strong>
    </a>

    <a href="#!/home" class="login-link" style="margin-top: 8px; opacity: 0.5;">
        <i class="fas fa-arrow-left"></i> Voltar ao início
    </a>

    <div class="version-footer">v{{CONFIG.VERSION}}</div>
</div>
