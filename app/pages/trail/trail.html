<div class="view-container trail-view">

    <!-- Header -->
    <div class="trail-header">
        <button class="trail-back" ng-click="goBack()" ng-if="level !== 'root'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button class="trail-back" ng-click="goHome()" ng-if="level === 'root'">
            <i class="fas fa-house"></i>
        </button>
        <h2>{{title}}</h2>
        <div class="trail-header-stats" ng-if="level === 'subject'">
            <span class="trail-stat trail-stat-points">
                <i class="fas fa-trophy"></i> {{playerPoints || 0}}
            </span>
            <span class="trail-stat trail-stat-streak">
                <i class="fas fa-bolt"></i> {{playerStreak || 0}}
            </span>
        </div>
        <div class="trail-header-right" ng-if="level !== 'subject'"></div>
    </div>

    <!-- Sticky Active Module Box (scroll-based) -->
    <div class="duo-sticky-module"
         ng-if="!loading && level === 'subject' && activeModule"
         ng-style="{'background-color': activeModule.color}">
        <div class="duo-sticky-module-info">
            <div class="duo-sticky-module-section">Seção {{activeModule.moduleIndex + 1}}</div>
            <div class="duo-sticky-module-title">{{activeModule.title}}</div>
        </div>
        <div class="duo-sticky-module-icon">
            <i class="fas fa-book-open"></i>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-screen" ng-if="loading" style="min-height: 200px;">
        <div class="loading-spinner"></div>
        <p>Carregando trilha...</p>
    </div>

    <!-- Duolingo S-curve trail -->
    <div class="duo-trail-container" ng-if="!loading && level === 'subject'">

        <div class="loading-screen" ng-if="trailLoading" style="min-height: 200px;">
            <div class="loading-spinner"></div>
        </div>

        <div class="duo-trail" ng-if="!trailLoading && trailItems.length > 0">
            <div ng-repeat="item in trailItems" class="duo-trail-item"
                 id="{{item._id ? 'trail-item-' + item._id : ''}}">

                <!-- Module Divider -->
                <div class="duo-module-divider" ng-if="item._type === 'module'">
                    — {{item.title}} —
                </div>

                <!-- Lesson Bubble (normal) -->
                <div class="duo-bubble-wrap" ng-if="item._type === 'lesson' && !isChest(item)"
                     ng-style="getBubbleStyle(item)">
                    <div class="duo-character-float" ng-if="item._charImg"
                         ng-style="getCharacterStyle(item)">
                        <img ng-src="{{item._charImg}}" class="duo-character-img"
                             alt="{{item._charName}}">
                        <div class="duo-character-shadow"></div>
                        <div class="duo-character-stars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                        </div>
                    </div>
                    <div ng-class="getBubbleClass(item)"
                         ng-style="getBubbleDynamic(item)"
                         ng-click="selectLesson(item, $event)">
                        <i class="fas" ng-class="item.icon"></i>
                    </div>

                    <div class="duo-popup" ng-if="selectedLesson._id === item._id"
                         ng-click="$event.stopPropagation()">
                        <div class="duo-popup-title">{{item.title}}</div>
                        <button class="btn btn-primary duo-popup-btn"
                                ng-style="{'background': item.moduleColor}"
                                ng-click="startLesson(item)"
                                ng-disabled="!item.is_unlocked">
                            {{!item.is_unlocked ? 'BLOQUEADA' : (item.percent >= 100 ? 'REVISAR' : 'COMEÇAR')}}
                        </button>
                    </div>
                </div>

                <!-- Chest Bubble -->
                <div class="duo-bubble-wrap duo-chest-wrap" ng-if="item._type === 'lesson' && isChest(item)"
                     ng-style="getBubbleStyle(item)">
                    <div class="duo-chest" ng-class="{'duo-chest-done': item.percent >= 100, 'duo-chest-locked': !item.is_unlocked}"
                         ng-click="selectLesson(item, $event)">
                        <img src="img/icon/trail/chest.png" class="duo-chest-img" alt="baú">
                    </div>

                    <div class="duo-popup" ng-if="selectedLesson._id === item._id"
                         ng-click="$event.stopPropagation()">
                        <div class="duo-popup-title">{{item.title}}</div>
                        <button class="btn btn-primary duo-popup-btn"
                                ng-style="{'background': item.moduleColor}"
                                ng-click="startLesson(item)"
                                ng-disabled="!item.is_unlocked">
                            {{!item.is_unlocked ? 'BLOQUEADA' : (item.percent >= 100 ? 'ABRIR' : 'DESAFIO')}}
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <div class="trail-empty" ng-if="!trailLoading && trailItems.length === 0">
            <div style="font-size: 48px; margin-bottom: 16px;">📂</div>
            <h3>Nenhum módulo ainda</h3>
            <p>O conteúdo será disponibilizado em breve.</p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" ng-if="!loading">
        <a class="bottom-nav-item" ng-click="goHome()">
            <i class="fas fa-house"></i>
            <span>Início</span>
        </a>
        <a class="bottom-nav-item active">
            <i class="fas fa-route"></i>
            <span>Trilha</span>
        </a>
        <a class="bottom-nav-item" ng-click="goGallery()">
            <i class="fas fa-images"></i>
            <span>Galeria</span>
        </a>
        <a class="bottom-nav-item">
            <i class="fas fa-circle-user"></i>
            <span>Perfil</span>
        </a>
    </nav>
</div>
