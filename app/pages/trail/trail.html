<div class="view-container trail-view">

    <!-- Header -->
    <div class="trail-header">
        <h2>{{title}}</h2>
        <div class="trail-header-stats">
            <span class="trail-stat trail-stat-points">
                <i class="fas fa-star"></i> {{playerPoints || 0}}
            </span>
            <span class="trail-stat trail-stat-coins">
                <i class="fas fa-coins"></i> {{playerCoins || 0}}
            </span>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-screen" ng-if="loading">
        <div class="loading-spinner"></div>
        <p>Carregando trilha...</p>
    </div>

    <!-- S-Curve trail directive — renders only after trailModules is ready -->
    <duo-trail
        ng-if="!loading && trailModules !== null"
        trail-modules="trailModules"
        cartoon-images="cartoonImages"
        chest-image="img/icon/trail/chest.png"
        score-key="rv_cartoon_scores"
        header-selector=".trail-header"
        on-lesson-start="handleLessonStart(lesson)">
    </duo-trail>

    <bottom-nav active="trail" ng-if="!loading"></bottom-nav>
</div>
