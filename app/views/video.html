<div class="view-container video-view">

    <!-- Header -->
    <div class="trail-header">
        <button class="trail-back" ng-click="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2>{{title}}</h2>
        <div class="trail-header-right"></div>
    </div>

    <!-- Loading -->
    <div class="loading-screen" ng-if="loading" style="min-height: 300px;">
        <div class="loading-spinner"></div>
        <p>Carregando vídeo...</p>
    </div>

    <!-- Video Player -->
    <div class="video-container" ng-if="!loading && embedUrl">
        <div class="video-responsive">
            <iframe ng-src="{{embedUrl}}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen></iframe>
        </div>

        <!-- Video Info -->
        <div class="video-info">
            <h3>{{title}}</h3>
            <button class="btn btn-primary video-done-btn" ng-click="markDone()"
                    ng-style="{'background': themeColor}" ng-if="!completed">
                <i class="fas fa-check"></i> CONCLUIR VÍDEO
            </button>
            <div class="video-completed" ng-if="completed">
                <i class="fas fa-check-circle"></i> Concluído!
            </div>
        </div>
    </div>

    <!-- Error -->
    <div class="trail-empty" ng-if="!loading && !embedUrl">
        <div style="font-size: 48px; margin-bottom: 16px;">📹</div>
        <h3>Vídeo não encontrado</h3>
        <p>Não foi possível carregar este vídeo.</p>
        <button class="btn" ng-click="goBack()" style="margin-top: 16px; background: var(--color-primary); color: #fff; padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer;">Voltar</button>
    </div>

    <!-- Debug (remove later) -->
    <div ng-if="rawEmbedUrl && !loading" style="display:none;">
        <!-- embedUrl: {{rawEmbedUrl}} -->
    </div>

</div>
