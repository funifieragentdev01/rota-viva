<div class="page">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-leaf"></i></div>
        <h1>Rota Viva</h1>
        <p ng-if="!preTheme">Gamificação para produtores rurais</p>
        <p ng-if="preTheme">{{preTheme.title}}</p>
    </div>

    <div class="card">
        <div class="card-title">{{welcomeText}}</div>

        <div class="msg msg-error" ng-if="error">
            <i class="fas fa-exclamation-circle"></i> {{error}}
        </div>

        <form ng-submit="login()">
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> CPF</label>
                <input type="tel" class="form-input" ng-model="form.cpf"
                       placeholder="000.000.000-00" maxlength="14"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Senha</label>
                <input type="password" class="form-input" ng-model="form.password"
                       placeholder="Sua senha"
                       autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" ng-disabled="submitting">
                <i class="fas fa-sign-in-alt" ng-if="!submitting"></i>
                {{submitting ? 'Entrando...' : 'Entrar'}}
            </button>
        </form>

        <a href="" ng-click="" class="link">
            <i class="fas fa-question-circle"></i> Esqueci minha senha
        </a>
    </div>

    <a href="#!/signup" class="link" style="margin-top: 24px;">
        Não tem conta? <strong>Cadastre-se</strong>
    </a>

    <a href="#!/home" class="link" style="margin-top: 8px; opacity: 0.5;">
        <i class="fas fa-arrow-left"></i> Voltar ao início
    </a>
</div>
