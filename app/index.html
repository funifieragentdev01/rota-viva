<!DOCTYPE html>
<html lang="pt-BR" ng-app="rotaViva">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5632">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Rota Viva</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/icon-192.png">
    <link rel="apple-touch-icon" href="img/icon-192.png">

    <!-- Fonts: Baloo 2 (display) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600&display=swap">

    <!-- Icons: Font Awesome 6 Solid -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Leaflet.js (GPS maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- QRCode.js (passaporte digital) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link rel="stylesheet" href="css/style.css?v=1.4.8">
</head>
<body ng-controller="MainCtrl">

    <!-- Loading -->
    <div class="loading-screen" ng-if="loading">
        <div class="loading-spinner"></div>
        <p>Carregando...</p>
    </div>

    <!-- Views -->
    <div ng-view class="view-container" ng-if="!loading"></div>

    <!-- Version footer -->
    <div class="app-version">v{{CONFIG.VERSION}}</div>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>

    <!-- Config -->
    <script src="config.js?v=1.4.8"></script>

    <!-- App module + routes -->
    <script src="app.js?v=1.4.8"></script>

    <!-- Services -->
    <script src="services/cpf.js?v=1.4.8"></script>
    <script src="services/sound.js?v=1.4.8"></script>
    <script src="services/theme.js?v=1.4.8"></script>
    <script src="services/auth.js?v=1.4.8"></script>
    <script src="services/api.js?v=1.4.8"></script>

    <!-- Components -->
    <script src="components/bottom-nav/bottom-nav.js?v=1.4.8"></script>

    <!-- Pages -->
    <script src="pages/landing/landing.js?v=1.4.8"></script>
    <script src="pages/rota/rota.js?v=1.4.8"></script>
    <script src="pages/onboarding/onboarding.js?v=1.4.8"></script>
    <script src="pages/login/login.js?v=1.4.8"></script>
    <script src="pages/signup/signup.js?v=1.4.8"></script>
    <script src="pages/dashboard/dashboard.js?v=1.4.8"></script>
    <script src="pages/trail/trail.js?v=1.4.8"></script>
    <script src="pages/gallery/gallery.js?v=1.4.8"></script>
    <script src="pages/profile/profile.js?v=1.4.8"></script>
    <script src="pages/quiz/quiz.js?v=1.4.8"></script>
    <script src="pages/video/video.js?v=1.4.8"></script>
    <script src="pages/reading/reading.js?v=1.4.8"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.log('SW registration failed:', err);
            });
        }
    </script>
</body>
</html>
