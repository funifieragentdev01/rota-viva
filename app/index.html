<!DOCTYPE html>
<html lang="pt-BR" ng-app="rotaViva">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5632">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Rota Viva</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/icon-192.png">
    <link rel="apple-touch-icon" href="img/icon-192.png">

    <!-- Fonts: Baloo 2 (display) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@400;500;600&display=swap">

    <!-- Icons: Font Awesome 6 Solid -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css?v=0.9.0">
</head>
<body ng-controller="MainCtrl">

    <!-- Loading -->
    <div class="loading-screen" ng-if="loading">
        <div class="loading-spinner"></div>
        <p>Carregando...</p>
    </div>

    <!-- Views -->
    <div ng-view class="view-container" ng-if="!loading"></div>

    <!-- Version footer -->
    <div class="app-version">v{{CONFIG.VERSION}}</div>

    <!-- Scripts -->
    <script src="config.js?v=0.9.0"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="js/app.js?v=0.9.0"></script>
    <script src="js/services.js?v=0.9.0"></script>
    <script src="js/controllers.js?v=0.9.0"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.log('SW registration failed:', err);
            });
        }
    </script>
</body>
</html>
